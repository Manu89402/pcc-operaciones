<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Firebase – PCC</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #e0e0e0; padding: 30px; }
  h2 { color: #06b6d4; margin-bottom: 20px; }
  .box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .ok  { border-color: #10b981; color: #6ee7b7; }
  .err { border-color: #f43f5e; color: #fda4af; }
  .wait { border-color: #f59e0b; color: #fde68a; }
  button { background: #06b6d4; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; margin: 5px; }
  button:hover { background: #0891b2; }
  pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<h2>🔥 Test de Conexión Firebase — Puerto Cancún Club</h2>

<div class="box" id="step1">
  <strong>Paso 1:</strong> Cargando scripts de Firebase…
</div>
<div class="box" id="step2">
  <strong>Paso 2:</strong> Esperando inicialización…
</div>
<div class="box" id="step3">
  <strong>Paso 3:</strong> Esperando conexión a Firestore…
</div>
<div class="box" id="step4">
  <strong>Paso 4:</strong> Esperando prueba de lectura…
</div>
<div class="box" id="step5">
  <strong>Paso 5:</strong> Esperando prueba de escritura…
</div>

<br>
<button onclick="runTest()">▶ Ejecutar prueba completa</button>
<button onclick="location.reload()">↺ Reiniciar</button>

<script>
function mark(id, ok, msg) {
  var el = document.getElementById(id);
  el.className = 'box ' + (ok === null ? 'wait' : ok ? 'ok' : 'err');
  var icon = ok === null ? '⏳' : ok ? '✅' : '❌';
  var title = el.querySelector('strong').outerHTML;
  el.innerHTML = title + ' ' + icon + ' ' + msg;
}

function runTest() {
  // Step 1: Scripts loaded?
  if (typeof firebase !== 'undefined') {
    mark('step1', true, 'Scripts cargados. Firebase version: ' + firebase.SDK_VERSION);
  } else {
    mark('step1', false, 'ERROR: firebase no está definido. Los scripts no cargaron.');
    return;
  }

  // Step 2: Initialize
  try {
    var apps = firebase.apps;
    var app;
    if (apps.length === 0) {
      app = firebase.initializeApp({
        apiKey: "AIzaSyCyh1Vx5x1bLeJ5bVIVUJ465Lt1ac0pnDw",
        authDomain: "dashboard-puertocancun.firebaseapp.com",
        projectId: "dashboard-puertocancun",
        storageBucket: "dashboard-puertocancun.firebasestorage.app",
        messagingSenderId: "905576010789",
        appId: "1:905576010789:web:03dfffc4ff1e79b7cf5bcc"
      });
    } else {
      app = apps[0];
    }
    mark('step2', true, 'Firebase inicializado. Proyecto: ' + app.options.projectId);
  } catch(e) {
    mark('step2', false, 'ERROR al inicializar: ' + e.message);
    return;
  }

  // Step 3: Firestore instance
  var db;
  try {
    db = firebase.firestore();
    mark('step3', true, 'Instancia de Firestore creada correctamente.');
  } catch(e) {
    mark('step3', false, 'ERROR al crear Firestore: ' + e.message);
    return;
  }

  // Step 4: Read test
  mark('step4', null, 'Intentando leer colección test_conexion…');
  db.collection('test_conexion').limit(1).get()
    .then(function(snap) {
      mark('step4', true, 'Lectura exitosa. Documentos encontrados: ' + snap.size);

      // Step 5: Write test
      mark('step5', null, 'Intentando escribir documento de prueba…');
      return db.collection('test_conexion').add({
        mensaje: 'Prueba desde GitHub Pages',
        fecha: new Date().toISOString(),
        origen: window.location.href
      });
    })
    .then(function(docRef) {
      mark('step5', true, '✅ FIREBASE CONECTADO CORRECTAMENTE. Doc creado con ID: ' + docRef.id);
    })
    .catch(function(e) {
      var detalles = '';
      if (e) {
        detalles = 'Código: ' + (e.code || 'N/A') + 
                   ' | Mensaje: ' + (e.message || 'N/A') +
                   ' | Tipo: ' + (e.name || typeof e);
      } else {
        detalles = 'Error completamente vacío (undefined/null)';
      }
      
      if (document.getElementById('step4').classList.contains('wait')) {
        mark('step4', false, 'ERROR en lectura. ' + detalles);
      } else {
        mark('step5', false, 'ERROR en escritura. ' + detalles);
      }
      
      console.error('Error completo:', e);
      console.error('Error JSON:', JSON.stringify(e, Object.getOwnPropertyNames(e)));
    });
}

// Auto-run on load
window.onload = function() {
  mark('step1', null, 'Verificando scripts…');
  setTimeout(runTest, 500);
};
</script>
</body>
</html>
